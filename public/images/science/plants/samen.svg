<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Soil/ground -->
  <rect x="5" y="85" width="110" height="30" rx="8" fill="#8B5E3C"/>
  <rect x="5" y="85" width="110" height="10" rx="5" fill="#6B3E1E" opacity="0.4"/>
