<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 6 petals around center -->
  <ellipse cx="60" cy="32" rx="16" ry="24" fill="#F48FB1"/>
  <ellipse cx="60" cy="32" rx="16" ry="24" fill="#F48FB1" transform="rotate(60 60 60)"/>
  <ellipse cx="60" cy="32" rx="16" ry="24" fill="#F48FB1" transform="rotate(120 60 60)"/>
  <ellipse cx="60" cy="88" rx="16" ry="24" fill="#F8BBD0"/>
  <ellipse cx="60" cy="88" rx="16" ry="24" fill="#F8BBD0" transform="rotate(60 60 60)"/>
  <ellipse cx="60" cy="88" rx="16" ry="24" fill="#F8BBD0" transform="rotate(120 60 60)"/>
  <!-- Center circle -->
  <circle cx="60" cy="60" r="18" fill="#FDD835"/>
  <!-- Center highlight -->
  <circle cx="54" cy="54" r="6" fill="#FFEE58" opacity="0.7"/>
  <!-- Tiny dots on center -->
  <circle cx="60" cy="55" r="2" fill="#F9A825"/>
  <circle cx="53" cy="62" r="2" fill="#F9A825"/>
  <circle cx="67" cy="62" r="2" fill="#F9A825"/>
  <circle cx="60" cy="68" r="2" fill="#F9A825"/>
</svg>
